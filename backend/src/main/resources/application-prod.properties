# Production Profile - MySQL Database
# spring.profiles.active=prod

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/petguardian_database?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (ADDED)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Production Logging
logging.level.org.springframework.security=INFO
logging.level.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS for Production
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://your-production-domain.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# H2 Console Disabled
spring.h2.console.enabled=false

# Server Error Configuration
server.error.include-stacktrace=never
server.error.include-message=always

# File Upload Path (ADDED)
app.upload.dir=./uploads-prod