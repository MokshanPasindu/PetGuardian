# Development Profile Configuration
# spring.profiles.active=dev

# H2 Database for Development - IMPROVED
spring.datasource.url=jdbc:h2:file:./data/petguardian-dev;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=1234

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA Configuration for Development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Development Logging - More verbose
logging.level.org.springframework.security=DEBUG
logging.level.backend.auth.security=DEBUG
logging.level.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Development Settings (24 hours for development)
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload Path
app.upload.dir=./uploads-dev

# CORS for Development
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Enable detailed error pages for development
server.error.include-stacktrace=always
server.error.include-message=always

# Initialize schema (if using data.sql)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true